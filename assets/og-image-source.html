<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #14121f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -280px;
    left: 50%;
    transform: translateX(-50%);
    width: 1000px;
    height: 600px;
    background: radial-gradient(ellipse at center, rgba(46,227,173,0.22), transparent 70%);
  }
  .glow2 {
    position: absolute;
    bottom: -260px;
    right: -160px;
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse at center, rgba(255,209,102,0.14), transparent 70%);
  }
  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 90px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }
  .mark {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: rgba(46,227,173,0.14);
    border: 1px solid rgba(46,227,173,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mark svg { width: 28px; height: 28px; }
  .brand-name {
    font-size: 30px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.01em;
  }
  h1 {
    font-size: 62px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.12;
    color: #ffffff;
    margin-bottom: 26px;
  }
  h1 .accent { color: #2ee3ad; }
  .sub {
    font-size: 24px;
    color: rgba(255,255,255,0.62);
    font-weight: 500;
  }
  .pills {
    display: flex;
    gap: 14px;
    margin-top: 40px;
  }
  .pill {
    font-size: 16px;
    font-weight: 700;
    color: #2ee3ad;
    background: rgba(46,227,173,0.12);
    border: 1px solid rgba(46,227,173,0.28);
    padding: 10px 20px;
    border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 64 64" fill="none">
          <path d="M14 33.5L27.5 47L50 20" stroke="#2EE3AD" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">CheckMate</span>
    </div>
    <h1>Split the bill.<br>Not the <span class="accent">friendship.</span></h1>
    <p class="sub">AI receipt scanning · Real-time splitting · Payment tracking</p>
    <div class="pills">
      <span class="pill">✦ AI Receipt Scanning</span>
      <span class="pill">⇄ Real-Time Splitting</span>
      <span class="pill">$ Payment Tracking</span>
    </div>
  </div>
</body>
</html>
